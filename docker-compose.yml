services:
  tamagochi-data:
    build:
      context: .
      dockerfile: data_service/Dockerfile
    container_name: tamagochi-data
    restart: unless-stopped
    env_file: .env
    volumes:
      - persistent_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import json,sys; d=json.load(open('/data/status.json')); sys.exit(0 if d.get('state') in ('running','starting') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  tamagochi-bot:
    build: .
    container_name: tamagochi-bot
    restart: unless-stopped
    stop_grace_period: 60s
    env_file: .env
    depends_on:
      tamagochi-data:
        condition: service_healthy
    command: ["python", "-u", "trading_bot.py", "--dry-run", "--data-service", "--data-dir", "/data", "--threshold", "0.70"]
    volumes:
      - ./trading_logs:/app/trading_logs
      - ./trading_state:/app/trading_state
      - persistent_data:/data:ro
      - ./logs/bot:/app/trading_logs/jsonl

  tamagochi-telegram:
    build:
      context: .
      dockerfile: telegram_service/Dockerfile
    container_name: tamagochi-telegram
    restart: unless-stopped
    stop_grace_period: 15s
    env_file: .env
    depends_on:
      tamagochi-data:
        condition: service_healthy
    volumes:
      - persistent_data:/data:ro
      - ./trading_state:/app/trading_state:ro
      - ./trading_logs:/app/trading_logs:ro
      - ./telegram_data:/app/telegram_data

  tamagochi-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: tamagochi-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      - DATA_DIR=/data
    ports:
      - "8501:8501"
    depends_on:
      tamagochi-data:
        condition: service_healthy
    volumes:
      - persistent_data:/data:ro
      - ./trading_logs:/app/trading_logs:ro
      - ./trading_state:/app/trading_state:ro

volumes:
  persistent_data:
